  <div id="gate" style="position:fixed;inset:0;z-index:999999;background:#0f0c29;display:flex;align-items:center;justify-content:center;padding:20px;font-family:sans-serif;">
    <div style="max-width:380px;width:100%;background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:32px;color:#fff;">
      <div style="background:#fbbf24;color:#000;text-align:center;padding:10px;border-radius:12px;font-weight:700;font-size:13px;letter-spacing:1px;margin-bottom:20px;">🔥 APPSUMO LIFETIME DEAL</div>
      <div style="width:52px;height:52px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-weight:700;color:#000;font-size:20px;">TS</div>
      <h1 style="text-align:center;font-size:20px;font-weight:700;margin:0 0 4px;">Activar Testimonial Studio</h1>
      <p style="text-align:center;color:#9ca3af;font-size:13px;margin:0 0 20px;">Ingresá tu código para acceder</p>
      <input id="gateName" placeholder="Nombre" style="width:100%;height:42px;margin-bottom:10px;padding:0 12px;border-radius:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;box-sizing:border-box;" />
      <input id="gateEmail" type="email" placeholder="Email" style="width:100%;height:42px;margin-bottom:10px;padding:0 12px;border-radius:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;box-sizing:border-box;" />
      <input id="gateCode" placeholder="Código AppSumo" style="width:100%;height:42px;margin-bottom:10px;padding:0 12px;border-radius:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;box-sizing:border-box;text-transform:uppercase;font-family:monospace;" />
      <div id="gateMsg" style="font-size:13px;margin-bottom:10px;min-height:0;"></div>
      <button id="gateBtn" style="width:100%;height:42px;border-radius:10px;background:#fbbf24;color:#000;font-weight:700;border:none;cursor:pointer;">🔓 Activar acceso</button>
    </div>
  </div>
  <script>
    (function () {
      var sb = window.supabase && window.supabase.createClient(
        'https://maimjyaaounuokmpovwl.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1haW1qeWFhb3VudW9rbXBvdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjk5NTUsImV4cCI6MjA5MjkwNTk1NX0.weez6OAUluisFZH0QlpDZf5EK59Lo7uQ-peivZ3JGTw'
      )
      var gate = document.getElementById('gate')
      var msg = document.getElementById('gateMsg')

      // Si ya está activado en este navegador, no mostrar el gate
      if (localStorage.getItem('ts_access')) {
        gate.style.display = 'none'
      }

      document.getElementById('gateBtn').addEventListener('click', async function () {
        var name = document.getElementById('gateName').value.trim()
        var email = document.getElementById('gateEmail').value.trim()
        var code = document.getElementById('gateCode').value.trim().toUpperCase()
        msg.style.color = '#f87171'
        msg.textContent = ''

        if (!name || !email || !code) { msg.textContent = 'Completá todos los campos'; return }
        if (!sb) { msg.textContent = 'Error de conexión (Supabase no cargó)'; return }

        var btn = document.getElementById('gateBtn')
        btn.disabled = true
        btn.textContent = '⏳ Validando...'

        try {
          var res = await sb.from('redemption_codes').select('*').eq('code', code).eq('used', false).single()
          if (res.error || !res.data) {
            msg.textContent = 'Código inválido o ya usado'
            btn.disabled = false
            btn.textContent = '🔓 Activar acceso'
            return
          }
          await sb.from('redemption_codes').update({ used: true, used_by: email }).eq('code', code)
          localStorage.setItem('ts_access', JSON.stringify({ name: name, email: email, plan: res.data.plan, date: new Date().toISOString() }))
          msg.style.color = '#4ade80'
          msg.textContent = '✅ Activado, entrando...'
          setTimeout(function () { gate.style.display = 'none' }, 600)
        } catch (err) {
          msg.textContent = 'Error: ' + (err && err.message ? err.message : String(err))
          btn.disabled = false
          btn.textContent = '🔓 Activar acceso'
        }
      })
    })()
  </script>
